
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }

.dash { padding: 1.5rem 0; }
.section-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }

.metrics-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.metric-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 14px 16px; }
.metric-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; }
.metric-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.metric-sub { font-size: 11px; color: var(--color-text-tertiary); margin-top: 3px; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.5rem; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.1rem 1.25rem; }

.goal-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.goal-row:last-child { margin-bottom: 0; }
.goal-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.goal-pct { font-size: 12px; color: var(--color-text-secondary); width: 34px; text-align: right; }
.bar-bg { flex: 1.5; height: 6px; border-radius: 4px; background: var(--color-background-secondary); overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }

.time-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.time-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.time-label { font-size: 13px; color: var(--color-text-primary); flex: 1; }
.time-hrs { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.time-bar-bg { height: 4px; background: var(--color-background-secondary); border-radius: 3px; overflow: hidden; }
.time-bar-fill { height: 100%; border-radius: 3px; }

.task-area { margin-bottom: 1.5rem; }
.task-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.task-row:last-child { border-bottom: none; }
.task-check { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--color-border-secondary); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s; }
.task-check.done { background: #1D9E75; border-color: #1D9E75; }
.task-check.done::after { content: ''; width: 5px; height: 8px; border: 1.5px solid white; border-top: none; border-left: none; transform: rotate(40deg) translateY(-1px); display: block; }
.task-text { flex: 1; font-size: 13px; color: var(--color-text-primary); cursor: pointer; transition: color 0.15s; }
.task-text.done { color: var(--color-text-tertiary); text-decoration: line-decoration; opacity: 0.6; }
.task-tag { font-size: 11px; padding: 2px 8px; border-radius: var(--border-radius-md); }
.tag-work { background: #E6F1FB; color: #185FA5; }
.tag-study { background: #EEEDFE; color: #534AB7; }
.tag-content { background: #FAEEDA; color: #854F0B; }
.tag-personal { background: #EAF3DE; color: #3B6D11; }

.add-row { display: flex; gap: 8px; margin-top: 10px; }
.add-row input { flex: 1; font-size: 13px; padding: 7px 10px; }
.add-row select { font-size: 12px; padding: 7px 8px; }
.add-row button { font-size: 12px; padding: 7px 14px; cursor: pointer; }

.wins-area { }
.win-item { display: flex; gap: 8px; padding: 8px 0; border-bottom: 0.5px solid var(--color-border-tertiary); align-items: flex-start; }
.win-item:last-child { border-bottom: none; }
.win-star { font-size: 13px; flex-shrink: 0; line-height: 1.5; color: #EF9F27; }
.win-text { font-size: 13px; color: var(--color-text-primary); line-height: 1.5; }
.win-date { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; }
.win-add { display: flex; gap: 8px; margin-top: 10px; }
.win-add input { flex: 1; font-size: 13px; padding: 7px 10px; }
.win-add button { font-size: 12px; padding: 7px 14px; cursor: pointer; }

.donut-wrap { display: flex; align-items: center; gap: 16px; }
.donut-legend { display: flex; flex-direction: column; gap: 8px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.nav { display: flex; gap: 6px; margin-bottom: 1.25rem; }
.nav-btn { font-size: 12px; padding: 5px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-secondary); cursor: pointer; transition: background 0.12s, color 0.12s; }
.nav-btn.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: transparent; }

.log-row { display: grid; grid-template-columns: 80px 1fr 60px 70px 24px; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 13px; }
.log-row:last-child { border-bottom: none; }
.log-head { font-size: 11px; color: var(--color-text-tertiary); }
.log-date { color: var(--color-text-secondary); }
.del-btn { background: none; border: none; cursor: pointer; font-size: 13px; color: var(--color-text-tertiary); padding: 0; line-height: 1; }
.del-btn:hover { color: #E24B4A; }
</style>

<div class="dash">
  <div class="nav">
    <button class="nav-btn active" onclick="showTab('overview')">Overview</button>
    <button class="nav-btn" onclick="showTab('goals')">Goals</button>
    <button class="nav-btn" onclick="showTab('tasks')">Tasks</button>
    <button class="nav-btn" onclick="showTab('time')">Time log</button>
    <button class="nav-btn" onclick="showTab('wins')">Wins</button>
  </div>

  <div id="tab-overview">
    <div class="section-label">Today at a glance</div>
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Tasks done</div>
        <div class="metric-val" id="m-tasks">0/5</div>
        <div class="metric-sub" id="m-tasks-sub">0% complete</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Hours logged</div>
        <div class="metric-val" id="m-hours">0h</div>
        <div class="metric-sub" id="m-hours-sub">today</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Goals on track</div>
        <div class="metric-val" id="m-goals">3/4</div>
        <div class="metric-sub">active goals</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Wins this week</div>
        <div class="metric-val" id="m-wins">0</div>
        <div class="metric-sub">recorded</div>
      </div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="section-label" style="margin-bottom:14px">Goal progress</div>
        <div id="overview-goals"></div>
      </div>
      <div class="card">
        <div class="section-label" style="margin-bottom:14px">Time by category</div>
        <div class="donut-wrap">
          <canvas id="donut" width="100" height="100"></canvas>
          <div class="donut-legend" id="donut-legend"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="tab-goals" style="display:none">
    <div class="section-label">Goals & progress</div>
    <div class="card" style="margin-bottom:14px">
      <div id="goals-list"></div>
      <div class="add-row" style="margin-top:12px">
        <input type="text" id="goal-input" placeholder="New goal..." />
        <select id="goal-cat">
          <option value="work">Work</option>
          <option value="study">Study</option>
          <option value="content">Content</option>
          <option value="personal">Personal</option>
        </select>
        <button onclick="addGoal()">Add ↗</button>
      </div>
    </div>
  </div>

  <div id="tab-tasks" style="display:none">
    <div class="section-label">Daily tasks</div>
    <div class="card">
      <div id="task-list"></div>
      <div class="add-row">
        <input type="text" id="task-input" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTask()" />
        <select id="task-cat">
          <option value="work">Work</option>
          <option value="study">Study</option>
          <option value="content">Content</option>
          <option value="personal">Personal</option>
        </select>
        <button onclick="addTask()">Add ↗</button>
      </div>
    </div>
  </div>

  <div id="tab-time" style="display:none">
    <div class="section-label">Time log</div>
    <div class="card" style="margin-bottom:14px">
      <div class="add-row" style="margin-top:0; margin-bottom:12px">
        <input type="text" id="time-activity" placeholder="Activity..." style="flex:2" />
        <select id="time-cat">
          <option value="work">Work</option>
          <option value="study">Study</option>
          <option value="content">Content</option>
          <option value="personal">Personal</option>
        </select>
        <input type="number" id="time-hrs" placeholder="hrs" min="0.25" step="0.25" style="width:64px; flex:none" />
        <button onclick="addTimeLog()">Log ↗</button>
      </div>
      <div class="log-row log-head">
        <span>Date</span><span>Activity</span><span>Category</span><span>Hours</span><span></span>
      </div>
      <div id="time-log-list"></div>
    </div>
    <div class="card">
      <div class="section-label" style="margin-bottom:14px">Hours by category</div>
      <div id="time-bars"></div>
    </div>
  </div>

  <div id="tab-wins" style="display:none">
    <div class="section-label">Wins & reflections</div>
    <div class="card">
      <div id="wins-list"></div>
      <div class="win-add">
        <input type="text" id="win-input" placeholder="Record a win or reflection..." onkeydown="if(event.key==='Enter')addWin()" />
        <button onclick="addWin()">Add ↗</button>
      </div>
    </div>
  </div>
</div>

<script>
const CAT_COLORS = { work: '#378ADD', study: '#7F77DD', content: '#EF9F27', personal: '#639922' };
const CAT_BG = { work: 'tag-work', study: 'tag-study', content: 'tag-content', personal: 'tag-personal' };
const CAT_FILLS = { work: '#378ADD', study: '#7F77DD', content: '#EF9F27', personal: '#639922' };

let tasks = [
  {id:1, text:'Review notes from lecture', cat:'study', done:false},
  {id:2, text:'Draft intro for article', cat:'content', done:false},
  {id:3, text:'Complete project proposal', cat:'work', done:false},
  {id:4, text:'30-min run', cat:'personal', done:false},
  {id:5, text:'Read one chapter', cat:'study', done:false},
];
let goals = [
  {id:1, name:'Complete online course', cat:'study', pct:62},
  {id:2, name:'Publish 4 articles/month', cat:'content', pct:50},
  {id:3, name:'Finish Q2 project', cat:'work', pct:78},
  {id:4, name:'Build exercise habit', cat:'personal', pct:35},
];
let timeLogs = [];
let wins = [];

function showTab(tab) {
  ['overview','goals','tasks','time','wins'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab?'block':'none';
  });
  document.querySelectorAll('.nav-btn').forEach((b,i) => {
    b.classList.toggle('active', ['overview','goals','tasks','time','wins'][i]===tab);
  });
  if(tab==='overview') renderOverview();
  if(tab==='goals') renderGoals();
  if(tab==='tasks') renderTasks();
  if(tab==='time') renderTime();
  if(tab==='wins') renderWins();
}

function renderOverview() {
  const done = tasks.filter(t=>t.done).length;
  document.getElementById('m-tasks').textContent = done+'/'+tasks.length;
  document.getElementById('m-tasks-sub').textContent = Math.round(done/tasks.length*100)+'% complete';
  const totalHrs = timeLogs.reduce((s,l)=>s+l.hrs,0);
  document.getElementById('m-hours').textContent = totalHrs.toFixed(1)+'h';
  document.getElementById('m-wins').textContent = wins.length;

  const gl = document.getElementById('overview-goals');
  gl.innerHTML = goals.map(g=>`
    <div class="goal-row">
      <span class="goal-name">${g.name}</span>
      <div class="bar-bg"><div class="bar-fill" style="width:${g.pct}%;background:${CAT_COLORS[g.cat]}"></div></div>
      <span class="goal-pct">${g.pct}%</span>
    </div>`).join('');

  drawDonut();
}

function drawDonut() {
  const canvas = document.getElementById('donut');
  const ctx = canvas.getContext('2d');
  const totals = {work:0,study:0,content:0,personal:0};
  timeLogs.forEach(l=>totals[l.cat]+=l.hrs);
  const total = Object.values(totals).reduce((a,b)=>a+b,0);
  ctx.clearRect(0,0,100,100);

  if(total===0) {
    ctx.beginPath(); ctx.arc(50,50,36,0,Math.PI*2); ctx.strokeStyle='#d3d1c7'; ctx.lineWidth=12; ctx.stroke();
    const leg = document.getElementById('donut-legend');
    leg.innerHTML = '<span style="font-size:12px;color:var(--color-text-tertiary)">No time logged yet</span>';
    return;
  }

  let start = -Math.PI/2;
  const cats = Object.keys(totals).filter(c=>totals[c]>0);
  cats.forEach(cat => {
    const angle = (totals[cat]/total)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(50,50);
    ctx.arc(50,50,40,start,start+angle);
    ctx.closePath(); ctx.fillStyle=CAT_FILLS[cat]; ctx.fill();
    start+=angle;
  });
  ctx.beginPath(); ctx.arc(50,50,26,0,Math.PI*2); 
  ctx.fillStyle='var(--color-background-primary)'; ctx.fill();

  const leg = document.getElementById('donut-legend');
  leg.innerHTML = ['work','study','content','personal'].map(c=>`
    <div class="legend-item">
      <span class="legend-dot" style="background:${CAT_FILLS[c]}"></span>
      <span>${c.charAt(0).toUpperCase()+c.slice(1)}</span>
      <span style="font-weight:500;color:var(--color-text-primary)">${totals[c].toFixed(1)}h</span>
    </div>`).join('');
}

function renderGoals() {
  const el = document.getElementById('goals-list');
  el.innerHTML = goals.map(g=>`
    <div class="goal-row">
      <span class="goal-name">${g.name}</span>
      <span class="task-tag ${CAT_BG[g.cat]}">${g.cat}</span>
      <div class="bar-bg" style="flex:2"><div class="bar-fill" style="width:${g.pct}%;background:${CAT_COLORS[g.cat]}"></div></div>
      <span class="goal-pct">${g.pct}%</span>
      <input type="range" min="0" max="100" value="${g.pct}" step="5" style="width:80px" oninput="updateGoal(${g.id},this.value)" />
      <button class="del-btn" onclick="deleteGoal(${g.id})">×</button>
    </div>`).join('');
}

function addGoal() {
  const inp = document.getElementById('goal-input');
  const cat = document.getElementById('goal-cat').value;
  if(!inp.value.trim()) return;
  goals.push({id:Date.now(), name:inp.value.trim(), cat, pct:0});
  inp.value=''; renderGoals();
}

function updateGoal(id, val) {
  const g = goals.find(g=>g.id===id);
  if(g) g.pct = parseInt(val);
  renderGoals();
}

function deleteGoal(id) {
  goals = goals.filter(g=>g.id!==id); renderGoals();
}

function renderTasks() {
  const el = document.getElementById('task-list');
  if(!tasks.length) { el.innerHTML='<p style="font-size:13px;color:var(--color-text-tertiary);padding:8px 0">No tasks yet.</p>'; return; }
  el.innerHTML = tasks.map(t=>`
    <div class="task-row">
      <div class="task-check ${t.done?'done':''}" onclick="toggleTask(${t.id})"></div>
      <span class="task-text ${t.done?'done':''}" onclick="toggleTask(${t.id})">${t.text}</span>
      <span class="task-tag ${CAT_BG[t.cat]}">${t.cat}</span>
      <button class="del-btn" onclick="deleteTask(${t.id})">×</button>
    </div>`).join('');
}

function toggleTask(id) {
  const t = tasks.find(t=>t.id===id); if(t) t.done=!t.done; renderTasks();
}

function addTask() {
  const inp = document.getElementById('task-input');
  const cat = document.getElementById('task-cat').value;
  if(!inp.value.trim()) return;
  tasks.push({id:Date.now(), text:inp.value.trim(), cat, done:false});
  inp.value=''; renderTasks();
}

function deleteTask(id) {
  tasks = tasks.filter(t=>t.id!==id); renderTasks();
}

function renderTime() {
  const el = document.getElementById('time-log-list');
  if(!timeLogs.length) { el.innerHTML='<p style="font-size:13px;color:var(--color-text-tertiary);padding:8px 0">No time logged yet.</p>'; }
  else el.innerHTML = timeLogs.slice().reverse().map(l=>`
    <div class="log-row">
      <span class="log-date">${l.date}</span>
      <span style="color:var(--color-text-primary)">${l.activity}</span>
      <span class="task-tag ${CAT_BG[l.cat]}">${l.cat}</span>
      <span style="font-weight:500">${l.hrs}h</span>
      <button class="del-btn" onclick="deleteLog(${l.id})">×</button>
    </div>`).join('');

  const totals = {work:0,study:0,content:0,personal:0};
  timeLogs.forEach(l=>totals[l.cat]+=l.hrs);
  const max = Math.max(...Object.values(totals),1);
  const bars = document.getElementById('time-bars');
  bars.innerHTML = Object.entries(totals).map(([cat,hrs])=>`
    <div class="time-row">
      <span class="time-dot" style="background:${CAT_FILLS[cat]}"></span>
      <span class="time-label">${cat.charAt(0).toUpperCase()+cat.slice(1)}</span>
      <span class="time-hrs">${hrs.toFixed(1)}h</span>
    </div>
    <div class="time-bar-bg" style="margin-bottom:12px">
      <div class="time-bar-fill" style="width:${Math.round(hrs/max*100)}%;background:${CAT_FILLS[cat]}"></div>
    </div>`).join('');
}

function addTimeLog() {
  const act = document.getElementById('time-activity').value.trim();
  const cat = document.getElementById('time-cat').value;
  const hrs = parseFloat(document.getElementById('time-hrs').value);
  if(!act || !hrs || hrs<=0) return;
  const today = new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'short'});
  timeLogs.push({id:Date.now(), activity:act, cat, hrs, date:today});
  document.getElementById('time-activity').value='';
  document.getElementById('time-hrs').value='';
  renderTime();
}

function deleteLog(id) {
  timeLogs = timeLogs.filter(l=>l.id!==id); renderTime();
}

function renderWins() {
  const el = document.getElementById('wins-list');
  if(!wins.length) { el.innerHTML='<p style="font-size:13px;color:var(--color-text-tertiary);padding:8px 0">No wins recorded yet — add your first one!</p>'; return; }
  el.innerHTML = wins.slice().reverse().map(w=>`
    <div class="win-item">
      <span class="win-star">★</span>
      <div>
        <div class="win-text">${w.text}</div>
        <div class="win-date">${w.date}</div>
      </div>
      <button class="del-btn" style="margin-left:auto" onclick="deleteWin(${w.id})">×</button>
    </div>`).join('');
}

function addWin() {
  const inp = document.getElementById('win-input');
  if(!inp.value.trim()) return;
  const today = new Date().toLocaleDateString('en-ZA',{weekday:'short',day:'2-digit',month:'short'});
  wins.push({id:Date.now(), text:inp.value.trim(), date:today});
  inp.value=''; renderWins();
  document.getElementById('m-wins').textContent = wins.length;
}

function deleteWin(id) {
  wins = wins.filter(w=>w.id!==id); renderWins();
}

renderOverview();
</script>
