<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Efficiency Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1410;--ink2:#5a4f45;--ink3:#9a8f85;
  --glass:rgba(255,252,248,0.52);--glass-h:rgba(255,252,248,0.70);
  --gb:rgba(255,255,255,0.62);
  --gs:0 8px 32px rgba(80,60,40,0.12),0 1.5px 0 rgba(255,255,255,0.72) inset;
  --gsh:0 18px 56px rgba(80,60,40,0.16),0 1.5px 0 rgba(255,255,255,0.82) inset;
  --r:18px;--rsm:12px;
  --work:#3a7fd5;--study:#7c6dd8;--content:#d4892a;--personal:#4a9e5c;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
}
html{font-size:15px}
body{font-family:var(--sans);background:#ddd5c8;color:var(--ink);min-height:100vh;overflow-x:hidden;position:relative}

/* ── Animated orb background ── */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.6;will-change:transform}
.o1{width:680px;height:680px;background:radial-gradient(circle,#d9bc9e,#c4976c,transparent 70%);top:-160px;left:-180px;animation:d1 28s ease-in-out infinite}
.o2{width:560px;height:560px;background:radial-gradient(circle,#adc8e2,#88aece,transparent 70%);top:10%;right:-130px;animation:d2 34s ease-in-out infinite}
.o3{width:500px;height:500px;background:radial-gradient(circle,#c8d9ae,#aac488,transparent 70%);bottom:-100px;left:20%;animation:d3 30s ease-in-out infinite}
.o4{width:420px;height:420px;background:radial-gradient(circle,#e2cab0,#d4a882,transparent 70%);bottom:5%;right:5%;animation:d4 24s ease-in-out infinite}
.o5{width:300px;height:300px;background:radial-gradient(circle,#c8bce8,#b0a2d8,transparent 70%);top:40%;left:38%;animation:d5 38s ease-in-out infinite}
.o6{width:240px;height:240px;background:radial-gradient(circle,#e8d4b8,#d8c098,transparent 70%);top:65%;left:8%;animation:d6 20s ease-in-out infinite}

@keyframes d1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(50px,-40px) scale(1.08)}66%{transform:translate(-30px,60px) scale(0.94)}}
@keyframes d2{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-60px,30px) scale(1.06)}66%{transform:translate(40px,-50px) scale(0.96)}}
@keyframes d3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-40px) scale(1.1)}}
@keyframes d4{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(-40px,-30px) scale(1.05)}80%{transform:translate(20px,40px) scale(0.95)}}
@keyframes d5{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(60px,40px) scale(1.12)}75%{transform:translate(-50px,-30px) scale(0.92)}}
@keyframes d6{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-50px) scale(1.08)}}

.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:160px 160px}

/* ── Page ── */
.page{position:relative;z-index:2;max-width:900px;margin:0 auto;padding:2.5rem 1.5rem 6rem}

/* ── Header ── */
header{margin-bottom:2.5rem;animation:fu 0.8s cubic-bezier(0.22,1,0.36,1) both}
header h1{font-family:var(--serif);font-size:clamp(30px,5vw,46px);font-weight:400;letter-spacing:-0.02em;line-height:1.08;color:var(--ink)}
header h1 em{font-style:italic;color:var(--ink2)}
.date-pill{display:inline-flex;align-items:center;gap:7px;margin-top:12px;
  background:rgba(255,255,255,0.38);border:1px solid rgba(255,255,255,0.55);
  backdrop-filter:blur(14px);border-radius:999px;padding:6px 16px;
  font-size:12px;color:var(--ink2);letter-spacing:0.025em}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--personal);animation:blink 2.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.75)}}

/* ── Nav ── */
.nav{display:flex;gap:6px;margin-bottom:2rem;flex-wrap:wrap;animation:fu 0.8s 0.08s cubic-bezier(0.22,1,0.36,1) both}
.nb{font-family:var(--sans);font-size:13px;font-weight:400;padding:8px 20px;
  background:rgba(255,252,248,0.38);border:1px solid rgba(255,255,255,0.52);
  border-radius:999px;color:var(--ink2);cursor:pointer;
  backdrop-filter:blur(18px);
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 2px 8px rgba(80,60,40,0.06)}
.nb:hover{background:rgba(255,252,248,0.62);color:var(--ink);transform:translateY(-2px);box-shadow:0 6px 20px rgba(80,60,40,0.11)}
.nb.active{background:var(--ink);color:#f5f0e8;border-color:transparent;transform:translateY(-2px);box-shadow:0 6px 22px rgba(26,20,16,0.22)}

/* ── Tabs ── */
.tab{display:none}
.tab.active{display:block;animation:fu 0.5s cubic-bezier(0.22,1,0.36,1) both}
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ── Glass card ── */
.gc{background:var(--glass);border:1px solid var(--gb);border-radius:var(--r);
  backdrop-filter:blur(28px) saturate(1.5);-webkit-backdrop-filter:blur(28px) saturate(1.5);
  box-shadow:var(--gs);padding:1.4rem 1.5rem;margin-bottom:14px;
  transition:background 0.35s,box-shadow 0.35s,transform 0.35s cubic-bezier(0.34,1.56,0.64,1)}
.gc:hover{background:var(--glass-h);box-shadow:var(--gsh)}
.gc:last-child{margin-bottom:0}

/* ── Metrics ── */
.mgrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.5rem}
@media(max-width:580px){.mgrid{grid-template-columns:repeat(2,1fr)}}
.mt{background:var(--glass);border:1px solid var(--gb);border-radius:var(--r);
  backdrop-filter:blur(28px) saturate(1.5);-webkit-backdrop-filter:blur(28px) saturate(1.5);
  box-shadow:var(--gs);padding:1.1rem 1.2rem 1.1rem;
  transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  animation:fu 0.7s ease both;cursor:default}
.mt:hover{transform:translateY(-4px) scale(1.025);box-shadow:var(--gsh);background:var(--glass-h)}
.mt:nth-child(1){animation-delay:0.12s}.mt:nth-child(2){animation-delay:0.19s}
.mt:nth-child(3){animation-delay:0.26s}.mt:nth-child(4){animation-delay:0.33s}
.ma{width:26px;height:3px;border-radius:2px;margin-bottom:11px}
.ml{font-size:11px;color:var(--ink3);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:5px}
.mv{font-family:var(--serif);font-size:32px;letter-spacing:-0.02em;color:var(--ink);line-height:1}
.ms{font-size:11px;color:var(--ink3);margin-top:4px}

/* ── Two col ── */
.tc2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:560px){.tc2{grid-template-columns:1fr}}

/* ── Labels ── */
.sl{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px}

/* ── Goals ── */
.gr{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.gr:last-of-type{margin-bottom:0}
.gn{font-size:13px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bb{flex:1.5;height:5px;border-radius:3px;background:rgba(26,20,16,0.07);overflow:hidden}
.bf{height:100%;border-radius:3px;transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1)}
.gp{font-size:11px;color:var(--ink3);width:30px;text-align:right}

/* ── Tags ── */
.tg{font-size:10px;padding:3px 9px;border-radius:999px;font-weight:500;letter-spacing:0.03em;flex-shrink:0}
.tw{background:rgba(58,127,213,0.13);color:#2568b0}
.ts{background:rgba(124,109,216,0.13);color:#604cac}
.tc3{background:rgba(212,137,42,0.13);color:#a86818}
.tp{background:rgba(74,158,92,0.13);color:#387a48}

/* ── Tasks ── */
.tr{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(26,20,16,0.06)}
.tr:last-of-type{border-bottom:none}
.cr{width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(26,20,16,0.18);
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);background:transparent}
.cr:hover{border-color:var(--personal);transform:scale(1.15)}
.cr.done{background:var(--personal);border-color:var(--personal)}
.cr.done::after{content:'';width:5px;height:8px;border:1.5px solid white;border-top:none;border-left:none;transform:rotate(40deg) translateY(-1px);display:block}
.tt{flex:1;font-size:13px;cursor:pointer;transition:opacity 0.2s}
.tt.done{opacity:0.36;text-decoration:line-through}

/* ── Inputs ── */
.ar{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
input,select,textarea{
  font-family:var(--sans);font-size:13px;
  background:rgba(255,252,248,0.55);border:1px solid rgba(255,255,255,0.65);
  border-radius:var(--rsm);padding:9px 12px;color:var(--ink);outline:none;
  backdrop-filter:blur(12px);
  transition:background 0.25s,border-color 0.25s,box-shadow 0.25s;
  box-shadow:0 1px 4px rgba(80,60,40,0.06) inset}
input:focus,select:focus,textarea:focus{
  background:rgba(255,252,248,0.82);border-color:rgba(255,255,255,0.9);
  box-shadow:0 0 0 3px rgba(26,20,16,0.055)}
input{flex:1;min-width:90px}
select{cursor:pointer}
.abtn{font-family:var(--sans);font-size:13px;padding:9px 18px;
  background:rgba(255,252,248,0.48);border:1px solid rgba(255,255,255,0.62);
  border-radius:var(--rsm);color:var(--ink);cursor:pointer;
  backdrop-filter:blur(12px);white-space:nowrap;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1)}
.abtn:hover{background:var(--ink);color:#f5f0e8;border-color:transparent;transform:translateY(-1px);box-shadow:0 6px 16px rgba(26,20,16,0.2)}
.abtn:active{transform:scale(0.97)}

.del{background:none;border:none;cursor:pointer;font-size:17px;color:var(--ink3);padding:0 2px;transition:color 0.15s,transform 0.2s;line-height:1;flex-shrink:0}
.del:hover{color:#c0392b;transform:scale(1.25)}

/* ── Log ── */
.lh,.lr{display:grid;grid-template-columns:68px 1fr 74px 48px 24px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(26,20,16,0.06);font-size:13px}
.lr:last-of-type{border-bottom:none}
.lh{font-size:10px;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink3);border-bottom:1px solid rgba(26,20,16,0.11)}

/* ── Time bars ── */
.tbw{margin-bottom:13px}
.tbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;color:var(--ink2)}
.tbt{height:7px;background:rgba(26,20,16,0.07);border-radius:4px;overflow:hidden}
.tbf{height:100%;border-radius:4px;transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1)}

/* ── Donut ── */
.dw{display:flex;align-items:center;gap:18px}
.dl{display:flex;flex-direction:column;gap:9px}
.li{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink2)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── Wins ── */
.wi{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(26,20,16,0.06);align-items:flex-start;animation:fu 0.4s ease both}
.wi:last-of-type{border-bottom:none}
.ws{color:#d4892a;font-size:14px;flex-shrink:0;line-height:1.7}
.wt{font-size:13px;line-height:1.55}
.wd{font-size:11px;color:var(--ink3);margin-top:2px}

/* ── Notes ── */
.nc{background:var(--glass);border:1px solid var(--gb);border-radius:var(--r);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:var(--gs);padding:1.1rem 1.25rem;margin-bottom:12px;
  animation:fu 0.45s ease both;
  transition:box-shadow 0.3s,transform 0.3s cubic-bezier(0.34,1.56,0.64,1)}
.nc:hover{transform:translateY(-2px);box-shadow:var(--gsh)}
.nh{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
textarea{width:100%;resize:vertical;min-height:75px}

/* ── Range ── */
input[type=range]{-webkit-appearance:none;appearance:none;width:80px;height:4px;border-radius:2px;background:rgba(26,20,16,0.12);outline:none;padding:0;box-shadow:none;border:none;cursor:pointer;flex:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--ink);cursor:pointer;border:2px solid rgba(255,255,255,0.8);transition:transform 0.2s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.35)}

/* ── Toast ── */
.toast{position:fixed;bottom:28px;right:28px;z-index:999;
  background:rgba(26,20,16,0.86);color:#f5f0e8;
  backdrop-filter:blur(22px);font-size:13px;padding:10px 22px;
  border-radius:999px;opacity:0;pointer-events:none;
  transform:translateY(10px);
  transition:opacity 0.28s,transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
  border:1px solid rgba(255,255,255,0.14)}
.toast.show{opacity:1;transform:translateY(0)}

.empty{font-size:13px;color:var(--ink3);padding:6px 0;font-style:italic}
</style>
</head>
<body>

<div class="bg">
  <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
  <div class="orb o4"></div><div class="orb o5"></div><div class="orb o6"></div>
</div>
<div class="grain"></div>

<div class="page">
  <header>
    <h1>My Efficiency<br><em>Dashboard</em></h1>
    <div class="date-pill">
      <span class="live-dot"></span>
      <span id="today-date"></span>
    </div>
  </header>

  <nav class="nav">
    <button class="nb active" onclick="showTab('overview')">Overview</button>
    <button class="nb" onclick="showTab('goals')">Goals</button>
    <button class="nb" onclick="showTab('tasks')">Tasks</button>
    <button class="nb" onclick="showTab('time')">Time log</button>
    <button class="nb" onclick="showTab('wins')">Wins</button>
    <button class="nb" onclick="showTab('notes')">Notes</button>
  </nav>

  <!-- OVERVIEW -->
  <div id="tab-overview" class="tab active">
    <div class="mgrid">
      <div class="mt"><div class="ma" style="background:var(--personal)"></div><div class="ml">Tasks done</div><div class="mv" id="m-tasks">—</div><div class="ms" id="m-tasks-sub"></div></div>
      <div class="mt"><div class="ma" style="background:var(--work)"></div><div class="ml">Hours logged</div><div class="mv" id="m-hours">0h</div><div class="ms">total</div></div>
      <div class="mt"><div class="ma" style="background:var(--study)"></div><div class="ml">Goals avg</div><div class="mv" id="m-goals">—</div><div class="ms">progress</div></div>
      <div class="mt"><div class="ma" style="background:var(--content)"></div><div class="ml">Wins logged</div><div class="mv" id="m-wins">0</div><div class="ms">all time</div></div>
    </div>
    <div class="tc2">
      <div class="gc"><div class="sl">Goal progress</div><div id="ov-goals"></div></div>
      <div class="gc"><div class="sl">Time by category</div>
        <div class="dw"><canvas id="donut" width="100" height="100"></canvas><div class="dl" id="dl"></div></div>
      </div>
    </div>
  </div>

  <!-- GOALS -->
  <div id="tab-goals" class="tab">
    <div class="gc"><div class="sl">Goals & progress</div>
      <div id="goals-list"></div>
      <div class="ar">
        <input type="text" id="goal-input" placeholder="New goal..."/>
        <select id="goal-cat"><option value="work">Work</option><option value="study">Study</option><option value="content">Content</option><option value="personal">Personal</option></select>
        <button class="abtn" onclick="addGoal()">Add +</button>
      </div>
    </div>
  </div>

  <!-- TASKS -->
  <div id="tab-tasks" class="tab">
    <div class="gc"><div class="sl">Daily tasks</div>
      <div id="task-list"></div>
      <div class="ar">
        <input type="text" id="task-input" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTask()"/>
        <select id="task-cat"><option value="work">Work</option><option value="study">Study</option><option value="content">Content</option><option value="personal">Personal</option></select>
        <button class="abtn" onclick="addTask()">Add +</button>
      </div>
    </div>
  </div>

  <!-- TIME LOG -->
  <div id="tab-time" class="tab">
    <div class="gc" style="margin-bottom:14px"><div class="sl">Log time</div>
      <div class="ar" style="margin-top:0">
        <input type="text" id="time-activity" placeholder="Activity..." style="flex:2"/>
        <select id="time-cat"><option value="work">Work</option><option value="study">Study</option><option value="content">Content</option><option value="personal">Personal</option></select>
        <input type="number" id="time-hrs" placeholder="hrs" min="0.25" step="0.25" style="width:70px;flex:none" onkeydown="if(event.key==='Enter')addTimeLog()"/>
        <button class="abtn" onclick="addTimeLog()">Log +</button>
      </div>
    </div>
    <div class="gc" style="margin-bottom:14px">
      <div class="lh"><span>Date</span><span>Activity</span><span>Category</span><span>Hours</span><span></span></div>
      <div id="time-log-list"></div>
    </div>
    <div class="gc"><div class="sl">Hours by category</div><div id="time-bars"></div></div>
  </div>

  <!-- WINS -->
  <div id="tab-wins" class="tab">
    <div class="gc"><div class="sl">Wins & reflections</div>
      <div id="wins-list"></div>
      <div class="ar">
        <input type="text" id="win-input" placeholder="Record a win or reflection..." onkeydown="if(event.key==='Enter')addWin()"/>
        <button class="abtn" onclick="addWin()">Add +</button>
      </div>
    </div>
  </div>

  <!-- NOTES -->
  <div id="tab-notes" class="tab">
    <div id="notes-list"></div>
    <div class="gc"><div class="sl">New note</div>
      <input type="text" id="note-title" placeholder="Title..." style="width:100%;margin-bottom:8px"/>
      <textarea id="note-body" placeholder="Write your note..."></textarea>
      <div class="ar" style="margin-top:10px">
        <select id="note-cat"><option value="work">Work</option><option value="study">Study</option><option value="content">Content</option><option value="personal">Personal</option></select>
        <button class="abtn" onclick="addNote()">Save note +</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CC={work:'#3a7fd5',study:'#7c6dd8',content:'#d4892a',personal:'#4a9e5c'};
const CT={work:'tw',study:'ts',content:'tc3',personal:'tp'};
const CN={work:'Work',study:'Study',content:'Content',personal:'Personal'};

function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

let tasks=ls('eff_tasks',[
  {id:1,text:'Review lecture notes',cat:'study',done:false},
  {id:2,text:'Draft article intro',cat:'content',done:false},
  {id:3,text:'Complete project proposal',cat:'work',done:false},
  {id:4,text:'30-min walk',cat:'personal',done:false},
]);
let goals=ls('eff_goals',[
  {id:1,name:'Complete online course',cat:'study',pct:62},
  {id:2,name:'Publish 4 articles/month',cat:'content',pct:50},
  {id:3,name:'Finish Q2 project',cat:'work',pct:78},
  {id:4,name:'Build exercise habit',cat:'personal',pct:35},
]);
let timeLogs=ls('eff_timelogs',[]);
let wins=ls('eff_wins',[]);
let notes=ls('eff_notes',[]);

document.getElementById('today-date').textContent=new Date().toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2000)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function today(){return new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'})}
function todayS(){return new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'short'})}

const TAB_MAP={overview:0,goals:1,tasks:2,time:3,wins:4,notes:5};
function showTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.nb')[TAB_MAP[tab]].classList.add('active');
  ({overview:renderOverview,goals:renderGoals,tasks:renderTasks,time:renderTime,wins:renderWins,notes:renderNotes})[tab]?.();
}

function renderOverview(){
  const done=tasks.filter(t=>t.done).length;
  document.getElementById('m-tasks').textContent=done+'/'+tasks.length;
  document.getElementById('m-tasks-sub').textContent=tasks.length?Math.round(done/tasks.length*100)+'% complete':'';
  document.getElementById('m-hours').textContent=timeLogs.reduce((s,l)=>s+l.hrs,0).toFixed(1)+'h';
  document.getElementById('m-goals').textContent=(goals.length?Math.round(goals.reduce((s,g)=>s+g.pct,0)/goals.length):0)+'%';
  document.getElementById('m-wins').textContent=wins.length;
  document.getElementById('ov-goals').innerHTML=goals.length
    ?goals.map(g=>`<div class="gr"><span class="gn">${esc(g.name)}</span><div class="bb"><div class="bf" style="width:${g.pct}%;background:${CC[g.cat]}"></div></div><span class="gp">${g.pct}%</span></div>`).join('')
    :'<p class="empty">No goals yet.</p>';
  drawDonut();
}

function drawDonut(){
  const c=document.getElementById('donut'),x=c.getContext('2d');
  const t={work:0,study:0,content:0,personal:0};
  timeLogs.forEach(l=>t[l.cat]+=l.hrs);
  const total=Object.values(t).reduce((a,b)=>a+b,0);
  x.clearRect(0,0,100,100);
  if(!total){x.beginPath();x.arc(50,50,36,0,Math.PI*2);x.strokeStyle='rgba(26,20,16,0.1)';x.lineWidth=12;x.stroke();document.getElementById('dl').innerHTML='<span style="font-size:12px;color:var(--ink3);font-style:italic">Log time to see chart</span>';return}
  let s=-Math.PI/2;
  Object.entries(t).filter(([,v])=>v>0).forEach(([cat,hrs])=>{const a=(hrs/total)*Math.PI*2;x.beginPath();x.moveTo(50,50);x.arc(50,50,40,s,s+a);x.closePath();x.fillStyle=CC[cat];x.fill();s+=a});
  x.beginPath();x.arc(50,50,26,0,Math.PI*2);x.fillStyle='rgba(221,213,200,0.7)';x.fill();
  document.getElementById('dl').innerHTML=Object.entries(t).map(([cat,hrs])=>`<div class="li"><span class="ld" style="background:${CC[cat]}"></span><span>${CN[cat]}</span><span style="font-weight:500;color:var(--ink);margin-left:4px">${hrs.toFixed(1)}h</span></div>`).join('');
}

function renderGoals(){
  document.getElementById('goals-list').innerHTML=goals.length
    ?goals.map(g=>`<div class="gr"><span class="gn">${esc(g.name)}</span><span class="tg ${CT[g.cat]}">${g.cat}</span><div class="bb" style="flex:2"><div class="bf" style="width:${g.pct}%;background:${CC[g.cat]}"></div></div><span class="gp">${g.pct}%</span><input type="range" min="0" max="100" step="5" value="${g.pct}" oninput="updG(${g.id},this.value)"/><button class="del" onclick="delG(${g.id})">×</button></div>`).join('')
    :'<p class="empty">No goals yet.</p>';
}
function addGoal(){const i=document.getElementById('goal-input'),c=document.getElementById('goal-cat').value;if(!i.value.trim())return;goals.push({id:Date.now(),name:i.value.trim(),cat:c,pct:0});i.value='';ss('eff_goals',goals);renderGoals();toast('Goal added')}
function updG(id,v){const g=goals.find(g=>g.id===id);if(g)g.pct=parseInt(v);ss('eff_goals',goals);renderGoals()}
function delG(id){goals=goals.filter(g=>g.id!==id);ss('eff_goals',goals);renderGoals();toast('Removed')}

function renderTasks(){
  document.getElementById('task-list').innerHTML=tasks.length
    ?tasks.map(t=>`<div class="tr"><div class="cr ${t.done?'done':''}" onclick="togT(${t.id})"></div><span class="tt ${t.done?'done':''}" onclick="togT(${t.id})">${esc(t.text)}</span><span class="tg ${CT[t.cat]}">${t.cat}</span><button class="del" onclick="delT(${t.id})">×</button></div>`).join('')
    :'<p class="empty">No tasks yet.</p>';
}
function togT(id){const t=tasks.find(t=>t.id===id);if(t)t.done=!t.done;ss('eff_tasks',tasks);renderTasks()}
function addTask(){const i=document.getElementById('task-input'),c=document.getElementById('task-cat').value;if(!i.value.trim())return;tasks.push({id:Date.now(),text:i.value.trim(),cat:c,done:false});i.value='';ss('eff_tasks',tasks);renderTasks();toast('Task added')}
function delT(id){tasks=tasks.filter(t=>t.id!==id);ss('eff_tasks',tasks);renderTasks();toast('Removed')}

function renderTime(){
  document.getElementById('time-log-list').innerHTML=timeLogs.length
    ?timeLogs.slice().reverse().map(l=>`<div class="lr"><span style="color:var(--ink3)">${l.date}</span><span>${esc(l.activity)}</span><span class="tg ${CT[l.cat]}">${l.cat}</span><span style="font-weight:500">${l.hrs}h</span><button class="del" onclick="delL(${l.id})">×</button></div>`).join('')
    :'<p class="empty" style="padding:10px 0">Nothing logged yet.</p>';
  const t={work:0,study:0,content:0,personal:0};
  timeLogs.forEach(l=>t[l.cat]+=l.hrs);
  const max=Math.max(...Object.values(t),1);
  document.getElementById('time-bars').innerHTML=Object.entries(t).map(([cat,hrs])=>`<div class="tbw"><div class="tbl"><span>${CN[cat]}</span><span style="font-weight:500">${hrs.toFixed(1)}h</span></div><div class="tbt"><div class="tbf" style="width:${Math.round(hrs/max*100)}%;background:${CC[cat]}"></div></div></div>`).join('');
}
function addTimeLog(){
  const a=document.getElementById('time-activity').value.trim(),c=document.getElementById('time-cat').value,h=parseFloat(document.getElementById('time-hrs').value);
  if(!a||!h||h<=0)return;
  timeLogs.push({id:Date.now(),activity:a,cat:c,hrs:h,date:todayS()});
  document.getElementById('time-activity').value='';document.getElementById('time-hrs').value='';
  ss('eff_timelogs',timeLogs);renderTime();toast('Time logged');
}
function delL(id){timeLogs=timeLogs.filter(l=>l.id!==id);ss('eff_timelogs',timeLogs);renderTime();toast('Removed')}

function renderWins(){
  document.getElementById('wins-list').innerHTML=wins.length
    ?wins.slice().reverse().map(w=>`<div class="wi"><span class="ws">★</span><div style="flex:1"><div class="wt">${esc(w.text)}</div><div class="wd">${w.date}</div></div><button class="del" onclick="delW(${w.id})">×</button></div>`).join('')
    :'<p class="empty">No wins yet — log your first one!</p>';
}
function addWin(){const i=document.getElementById('win-input');if(!i.value.trim())return;wins.push({id:Date.now(),text:i.value.trim(),date:today()});i.value='';ss('eff_wins',wins);renderWins();toast('Win recorded ★')}
function delW(id){wins=wins.filter(w=>w.id!==id);ss('eff_wins',wins);renderWins()}

function renderNotes(){
  document.getElementById('notes-list').innerHTML=notes.length
    ?notes.slice().reverse().map(n=>`<div class="nc"><div class="nh"><div><span style="font-weight:500;font-size:14px">${esc(n.title)||'Untitled'}</span><span class="tg ${CT[n.cat]}" style="margin-left:8px">${n.cat}</span></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><span style="font-size:11px;color:var(--ink3)">${n.date}</span><button class="del" onclick="delN(${n.id})">×</button></div></div><p style="font-size:13px;color:var(--ink2);white-space:pre-wrap;line-height:1.65">${esc(n.body)}</p></div>`).join('')
    :'';
}
function addNote(){
  const ti=document.getElementById('note-title').value.trim(),bo=document.getElementById('note-body').value.trim(),c=document.getElementById('note-cat').value;
  if(!bo)return;
  notes.push({id:Date.now(),title:ti,body:bo,cat:c,date:today()});
  document.getElementById('note-title').value='';document.getElementById('note-body').value='';
  ss('eff_notes',notes);renderNotes();toast('Note saved');
}
function delN(id){notes=notes.filter(n=>n.id!==id);ss('eff_notes',notes);renderNotes()}

/* parallax mouse effect on orbs */
let mx=0,my=0,ox=0,oy=0;
document.addEventListener('mousemove',e=>{mx=(e.clientX/window.innerWidth-0.5)*24;my=(e.clientY/window.innerHeight-0.5)*24});
function tickParallax(){
  ox+=(mx-ox)*0.06;oy+=(my-oy)*0.06;
  document.querySelectorAll('.orb').forEach((o,i)=>{
    const f=(i+1)*0.38;
    o.style.transform=`translate(${ox*f}px,${oy*f}px)`;
  });
  requestAnimationFrame(tickParallax);
}
tickParallax();

renderOverview();
</script>
</body>
</html>
