<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Efficiency Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --surface2: #f1efe8;
    --border: rgba(0,0,0,0.1);
    --border-md: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #9a9890;
    --radius: 10px;
    --radius-lg: 14px;
    --work: #378ADD;
    --study: #7F77DD;
    --content: #EF9F27;
    --personal: #639922;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --surface2: #2c2c2a;
      --border: rgba(255,255,255,0.09);
      --border-md: rgba(255,255,255,0.16);
      --text: #f0ede6;
      --text2: #9a9890;
      --text3: #6a6865;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  .page { max-width: 860px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  header { margin-bottom: 2rem; }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  header p { font-size: 13px; color: var(--text3); margin-top: 3px; }

  .nav { display: flex; gap: 6px; margin-bottom: 1.75rem; flex-wrap: wrap; }
  .nav-btn {
    font-size: 13px; padding: 6px 16px;
    border: 1px solid var(--border-md);
    border-radius: 999px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.12s;
    font-family: inherit;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--text); color: var(--bg); border-color: transparent; }

  .tab { display: none; }
  .tab.active { display: block; }

  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--text3); margin-bottom: 12px;
  }

  .metrics-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1.75rem; }
  @media (max-width: 600px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }

  .metric-card { background: var(--surface2); border-radius: var(--radius); padding: 14px 16px; }
  .metric-card .label { font-size: 12px; color: var(--text2); margin-bottom: 5px; }
  .metric-card .val { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }
  .metric-card .sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.75rem; }
  @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.25rem;
    margin-bottom: 14px;
  }
  .card:last-child { margin-bottom: 0; }

  .goal-row { display: flex; align-items: center; gap: 10px; margin-bottom: 13px; }
  .goal-row:last-of-type { margin-bottom: 0; }
  .goal-name { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-bg { flex: 1.5; height: 6px; border-radius: 4px; background: var(--surface2); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
  .goal-pct { font-size: 12px; color: var(--text2); width: 34px; text-align: right; }

  .task-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .task-row:last-of-type { border-bottom: none; }
  .task-check {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1.5px solid var(--border-md);
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .task-check.done { background: var(--personal); border-color: var(--personal); }
  .task-check.done::after {
    content: ''; width: 5px; height: 8px;
    border: 1.5px solid white; border-top: none; border-left: none;
    transform: rotate(40deg) translateY(-1px); display: block;
  }
  .task-text { flex: 1; font-size: 13px; cursor: pointer; transition: opacity 0.15s; }
  .task-text.done { opacity: 0.4; text-decoration: line-through; }
  .task-note { font-size: 11px; color: var(--text3); }

  .tag {
    font-size: 11px; padding: 2px 8px; border-radius: 999px; flex-shrink: 0;
  }
  .tag-work { background: #E6F1FB; color: #185FA5; }
  .tag-study { background: #EEEDFE; color: #534AB7; }
  .tag-content { background: #FAEEDA; color: #854F0B; }
  .tag-personal { background: #EAF3DE; color: #3B6D11; }

  @media (prefers-color-scheme: dark) {
    .tag-work { background: #0C447C33; color: #85B7EB; }
    .tag-study { background: #3C348933; color: #AFA9EC; }
    .tag-content { background: #63380633; color: #FAC775; }
    .tag-personal { background: #27500A33; color: #97C459; }
  }

  .add-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .add-row input, .add-row select, .add-row textarea {
    font-family: inherit; font-size: 13px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px; color: var(--text);
    outline: none; transition: border-color 0.12s;
  }
  .add-row input:focus, .add-row select:focus, .add-row textarea:focus { border-color: var(--border-md); }
  .add-row input { flex: 1; min-width: 120px; }
  .add-row select { min-width: 90px; }
  .add-row button {
    font-family: inherit; font-size: 13px; padding: 8px 16px;
    border: 1px solid var(--border-md); border-radius: var(--radius);
    background: transparent; color: var(--text); cursor: pointer;
    transition: background 0.12s;
  }
  .add-row button:hover { background: var(--surface2); }

  .del-btn {
    background: none; border: none; cursor: pointer;
    font-size: 16px; color: var(--text3); padding: 0 2px; line-height: 1;
    transition: color 0.12s;
  }
  .del-btn:hover { color: #E24B4A; }

  .log-header, .log-row {
    display: grid;
    grid-template-columns: 72px 1fr 80px 52px 24px;
    gap: 8px; align-items: center; padding: 8px 0;
    border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .log-row:last-of-type { border-bottom: none; }
  .log-header { font-size: 11px; color: var(--text3); border-bottom: 1px solid var(--border-md); }

  .win-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .win-item:last-of-type { border-bottom: none; }
  .win-star { color: #EF9F27; font-size: 14px; flex-shrink: 0; line-height: 1.6; }
  .win-text { font-size: 13px; flex: 1; }
  .win-date { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .time-bar-wrap { margin-bottom: 14px; }
  .time-bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .time-bar-track { height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .time-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }

  .donut-wrap { display: flex; align-items: center; gap: 18px; }
  .donut-legend { display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  .empty { font-size: 13px; color: var(--text3); padding: 8px 0; }

  .slider-wrap { display: flex; align-items: center; gap: 8px; }
  .slider-wrap input[type=range] {
    width: 80px; accent-color: var(--text2);
  }

  textarea.note-input {
    width: 100%; resize: vertical; min-height: 70px;
    font-family: inherit; font-size: 13px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px; color: var(--text);
    outline: none; margin-top: 10px;
    transition: border-color 0.12s;
  }
  textarea.note-input:focus { border-color: var(--border-md); }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--text); color: var(--bg);
    font-size: 13px; padding: 10px 18px; border-radius: var(--radius);
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    z-index: 999;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="page">

  <header>
    <h1>My Efficiency Dashboard</h1>
    <p id="today-date"></p>
  </header>

  <nav class="nav">
    <button class="nav-btn active" onclick="showTab('overview')">Overview</button>
    <button class="nav-btn" onclick="showTab('goals')">Goals</button>
    <button class="nav-btn" onclick="showTab('tasks')">Tasks</button>
    <button class="nav-btn" onclick="showTab('time')">Time log</button>
    <button class="nav-btn" onclick="showTab('wins')">Wins</button>
    <button class="nav-btn" onclick="showTab('notes')">Notes</button>
  </nav>

  <!-- OVERVIEW -->
  <div id="tab-overview" class="tab active">
    <div class="section-label">Today at a glance</div>
    <div class="metrics-grid">
      <div class="metric-card"><div class="label">Tasks done</div><div class="val" id="m-tasks">—</div><div class="sub" id="m-tasks-sub"></div></div>
      <div class="metric-card"><div class="label">Hours logged</div><div class="val" id="m-hours">0h</div><div class="sub">total</div></div>
      <div class="metric-card"><div class="label">Goals avg</div><div class="val" id="m-goals">—</div><div class="sub">progress</div></div>
      <div class="metric-card"><div class="label">Wins logged</div><div class="val" id="m-wins">0</div><div class="sub">all time</div></div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="section-label">Goal progress</div>
        <div id="ov-goals"></div>
      </div>
      <div class="card">
        <div class="section-label">Time by category</div>
        <div class="donut-wrap">
          <canvas id="donut" width="100" height="100"></canvas>
          <div class="donut-legend" id="donut-legend"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- GOALS -->
  <div id="tab-goals" class="tab">
    <div class="section-label">Goals & progress</div>
    <div class="card">
      <div id="goals-list"></div>
      <div class="add-row">
        <input type="text" id="goal-input" placeholder="New goal..." />
        <select id="goal-cat">
          <option value="work">Work</option>
          <option value="study">Study</option>
          <option value="content">Content</option>
          <option value="personal">Personal</option>
        </select>
        <button onclick="addGoal()">Add +</button>
      </div>
    </div>
  </div>

  <!-- TASKS -->
  <div id="tab-tasks" class="tab">
    <div class="section-label">Daily tasks</div>
    <div class="card">
      <div id="task-list"></div>
      <div class="add-row">
        <input type="text" id="task-input" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTask()" />
        <select id="task-cat">
          <option value="work">Work</option>
          <option value="study">Study</option>
          <option value="content">Content</option>
          <option value="personal">Personal</option>
        </select>
        <button onclick="addTask()">Add +</button>
      </div>
    </div>
  </div>

  <!-- TIME LOG -->
  <div id="tab-time" class="tab">
    <div class="section-label">Time log</div>
    <div class="card">
      <div class="add-row" style="margin-top:0">
        <input type="text" id="time-activity" placeholder="Activity..." style="flex:2" />
        <select id="time-cat">
          <option value="work">Work</option>
          <option value="study">Study</option>
          <option value="content">Content</option>
          <option value="personal">Personal</option>
        </select>
        <input type="number" id="time-hrs" placeholder="hrs" min="0.25" step="0.25" style="width:70px;flex:none" onkeydown="if(event.key==='Enter')addTimeLog()" />
        <button onclick="addTimeLog()">Log +</button>
      </div>
    </div>
    <div class="card">
      <div class="log-header"><span>Date</span><span>Activity</span><span>Category</span><span>Hours</span><span></span></div>
      <div id="time-log-list"></div>
    </div>
    <div class="card">
      <div class="section-label">Hours by category</div>
      <div id="time-bars"></div>
    </div>
  </div>

  <!-- WINS -->
  <div id="tab-wins" class="tab">
    <div class="section-label">Wins & reflections</div>
    <div class="card">
      <div id="wins-list"></div>
      <div class="add-row">
        <input type="text" id="win-input" placeholder="Record a win or reflection..." onkeydown="if(event.key==='Enter')addWin()" />
        <button onclick="addWin()">Add +</button>
      </div>
    </div>
  </div>

  <!-- NOTES -->
  <div id="tab-notes" class="tab">
    <div class="section-label">Notes & comments</div>
    <div class="card">
      <div id="notes-list"></div>
      <div class="add-row" style="flex-direction:column;align-items:stretch">
        <input type="text" id="note-title" placeholder="Note title..." />
        <textarea class="note-input" id="note-body" placeholder="Write your note here..."></textarea>
        <div style="display:flex;gap:8px;margin-top:0">
          <select id="note-cat" style="font-family:inherit;font-size:13px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text);flex:none">
            <option value="work">Work</option>
            <option value="study">Study</option>
            <option value="content">Content</option>
            <option value="personal">Personal</option>
          </select>
          <button onclick="addNote()" style="font-family:inherit;font-size:13px;padding:8px 16px;border:1px solid var(--border-md);border-radius:var(--radius);background:transparent;color:var(--text);cursor:pointer;">Save note +</button>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const CAT_COLOR = { work:'#378ADD', study:'#7F77DD', content:'#EF9F27', personal:'#639922' };
const CAT_TAG = { work:'tag-work', study:'tag-study', content:'tag-content', personal:'tag-personal' };

function load(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

let tasks = load('eff_tasks', [
  {id:1,text:'Review lecture notes',cat:'study',done:false},
  {id:2,text:'Draft article intro',cat:'content',done:false},
  {id:3,text:'Complete project proposal',cat:'work',done:false},
  {id:4,text:'30-min walk',cat:'personal',done:false},
]);
let goals = load('eff_goals', [
  {id:1,name:'Complete online course',cat:'study',pct:62},
  {id:2,name:'Publish 4 articles/month',cat:'content',pct:50},
  {id:3,name:'Finish Q2 project',cat:'work',pct:78},
  {id:4,name:'Build exercise habit',cat:'personal',pct:35},
]);
let timeLogs = load('eff_timelogs', []);
let wins = load('eff_wins', []);
let notes = load('eff_notes', []);

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

function today() {
  return new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'});
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  [...document.querySelectorAll('.nav-btn')].find(b=>b.textContent.toLowerCase().startsWith(tab.slice(0,4))||b.getAttribute('onclick').includes(tab)).classList.add('active');
  const renders = {overview:renderOverview,goals:renderGoals,tasks:renderTasks,time:renderTime,wins:renderWins,notes:renderNotes};
  if(renders[tab]) renders[tab]();
}

document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function renderOverview() {
  const done = tasks.filter(t=>t.done).length;
  document.getElementById('m-tasks').textContent = done+'/'+tasks.length;
  document.getElementById('m-tasks-sub').textContent = tasks.length ? Math.round(done/tasks.length*100)+'% complete' : '';
  const hrs = timeLogs.reduce((s,l)=>s+l.hrs,0);
  document.getElementById('m-hours').textContent = hrs.toFixed(1)+'h';
  const avg = goals.length ? Math.round(goals.reduce((s,g)=>s+g.pct,0)/goals.length) : 0;
  document.getElementById('m-goals').textContent = avg+'%';
  document.getElementById('m-wins').textContent = wins.length;

  document.getElementById('ov-goals').innerHTML = goals.length
    ? goals.map(g=>`<div class="goal-row">
        <span class="goal-name">${esc(g.name)}</span>
        <div class="bar-bg"><div class="bar-fill" style="width:${g.pct}%;background:${CAT_COLOR[g.cat]}"></div></div>
        <span class="goal-pct">${g.pct}%</span>
      </div>`).join('')
    : '<p class="empty">No goals yet.</p>';

  drawDonut();
}

function drawDonut() {
  const canvas = document.getElementById('donut');
  const ctx = canvas.getContext('2d');
  const totals = {work:0,study:0,content:0,personal:0};
  timeLogs.forEach(l=>totals[l.cat]+=l.hrs);
  const total = Object.values(totals).reduce((a,b)=>a+b,0);
  ctx.clearRect(0,0,100,100);
  if(!total) {
    ctx.beginPath(); ctx.arc(50,50,36,0,Math.PI*2);
    ctx.strokeStyle='var(--border-md)'; ctx.lineWidth=12; ctx.stroke();
    document.getElementById('donut-legend').innerHTML='<span style="font-size:12px;color:var(--text3)">Log time to see chart</span>';
    return;
  }
  let start=-Math.PI/2;
  Object.entries(totals).filter(([,v])=>v>0).forEach(([cat,hrs])=>{
    const angle=(hrs/total)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(50,50);
    ctx.arc(50,50,40,start,start+angle);
    ctx.closePath(); ctx.fillStyle=CAT_COLOR[cat]; ctx.fill();
    start+=angle;
  });
  ctx.beginPath(); ctx.arc(50,50,26,0,Math.PI*2);
  ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--surface')||'#fff';
  ctx.fill();
  document.getElementById('donut-legend').innerHTML=Object.entries(totals).map(([cat,hrs])=>`
    <div class="legend-item">
      <span class="legend-dot" style="background:${CAT_COLOR[cat]}"></span>
      <span>${cap(cat)}</span>
      <span style="font-weight:500;color:var(--text);margin-left:4px">${hrs.toFixed(1)}h</span>
    </div>`).join('');
}

function renderGoals() {
  document.getElementById('goals-list').innerHTML = goals.length
    ? goals.map(g=>`<div class="goal-row">
        <span class="goal-name">${esc(g.name)}</span>
        <span class="tag ${CAT_TAG[g.cat]}">${g.cat}</span>
        <div class="bar-bg" style="flex:2"><div class="bar-fill" style="width:${g.pct}%;background:${CAT_COLOR[g.cat]}"></div></div>
        <span class="goal-pct">${g.pct}%</span>
        <div class="slider-wrap">
          <input type="range" min="0" max="100" step="5" value="${g.pct}" oninput="updateGoal(${g.id},this.value)" />
        </div>
        <button class="del-btn" onclick="deleteGoal(${g.id})">×</button>
      </div>`).join('')
    : '<p class="empty">No goals yet.</p>';
}

function addGoal() {
  const inp=document.getElementById('goal-input'), cat=document.getElementById('goal-cat').value;
  if(!inp.value.trim()) return;
  goals.push({id:Date.now(),name:inp.value.trim(),cat,pct:0});
  inp.value=''; save('eff_goals',goals); renderGoals(); toast('Goal added');
}
function updateGoal(id,val) {
  const g=goals.find(g=>g.id===id); if(g) g.pct=parseInt(val);
  save('eff_goals',goals); renderGoals();
}
function deleteGoal(id) {
  goals=goals.filter(g=>g.id!==id); save('eff_goals',goals); renderGoals(); toast('Goal removed');
}

function renderTasks() {
  document.getElementById('task-list').innerHTML = tasks.length
    ? tasks.map(t=>`<div class="task-row">
        <div class="task-check ${t.done?'done':''}" onclick="toggleTask(${t.id})"></div>
        <span class="task-text ${t.done?'done':''}" onclick="toggleTask(${t.id})">${esc(t.text)}</span>
        <span class="tag ${CAT_TAG[t.cat]}">${t.cat}</span>
        <button class="del-btn" onclick="deleteTask(${t.id})">×</button>
      </div>`).join('')
    : '<p class="empty">No tasks yet.</p>';
}
function toggleTask(id) {
  const t=tasks.find(t=>t.id===id); if(t) t.done=!t.done;
  save('eff_tasks',tasks); renderTasks();
}
function addTask() {
  const inp=document.getElementById('task-input'), cat=document.getElementById('task-cat').value;
  if(!inp.value.trim()) return;
  tasks.push({id:Date.now(),text:inp.value.trim(),cat,done:false});
  inp.value=''; save('eff_tasks',tasks); renderTasks(); toast('Task added');
}
function deleteTask(id) {
  tasks=tasks.filter(t=>t.id!==id); save('eff_tasks',tasks); renderTasks(); toast('Task removed');
}

function renderTime() {
  const el=document.getElementById('time-log-list');
  el.innerHTML = timeLogs.length
    ? timeLogs.slice().reverse().map(l=>`<div class="log-row">
        <span style="color:var(--text2)">${l.date}</span>
        <span>${esc(l.activity)}</span>
        <span class="tag ${CAT_TAG[l.cat]}">${l.cat}</span>
        <span style="font-weight:500">${l.hrs}h</span>
        <button class="del-btn" onclick="deleteLog(${l.id})">×</button>
      </div>`).join('')
    : '<p class="empty" style="padding:10px 0">No time logged yet.</p>';

  const totals={work:0,study:0,content:0,personal:0};
  timeLogs.forEach(l=>totals[l.cat]+=l.hrs);
  const max=Math.max(...Object.values(totals),1);
  document.getElementById('time-bars').innerHTML=Object.entries(totals).map(([cat,hrs])=>`
    <div class="time-bar-wrap">
      <div class="time-bar-label">
        <span>${cap(cat)}</span>
        <span style="font-weight:500">${hrs.toFixed(1)}h</span>
      </div>
      <div class="time-bar-track">
        <div class="time-bar-fill" style="width:${Math.round(hrs/max*100)}%;background:${CAT_COLOR[cat]}"></div>
      </div>
    </div>`).join('');
}
function addTimeLog() {
  const act=document.getElementById('time-activity').value.trim();
  const cat=document.getElementById('time-cat').value;
  const hrs=parseFloat(document.getElementById('time-hrs').value);
  if(!act||!hrs||hrs<=0) return;
  timeLogs.push({id:Date.now(),activity:act,cat,hrs,date:new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'short'})});
  document.getElementById('time-activity').value='';
  document.getElementById('time-hrs').value='';
  save('eff_timelogs',timeLogs); renderTime(); toast('Time logged');
}
function deleteLog(id) {
  timeLogs=timeLogs.filter(l=>l.id!==id); save('eff_timelogs',timeLogs); renderTime(); toast('Entry removed');
}

function renderWins() {
  document.getElementById('wins-list').innerHTML = wins.length
    ? wins.slice().reverse().map(w=>`<div class="win-item">
        <span class="win-star">★</span>
        <div style="flex:1">
          <div class="win-text">${esc(w.text)}</div>
          <div class="win-date">${w.date}</div>
        </div>
        <button class="del-btn" onclick="deleteWin(${w.id})">×</button>
      </div>`).join('')
    : '<p class="empty">No wins yet — log your first one!</p>';
}
function addWin() {
  const inp=document.getElementById('win-input');
  if(!inp.value.trim()) return;
  wins.push({id:Date.now(),text:inp.value.trim(),date:today()});
  inp.value=''; save('eff_wins',wins); renderWins(); toast('Win recorded ★');
}
function deleteWin(id) {
  wins=wins.filter(w=>w.id!==id); save('eff_wins',wins); renderWins();
}

function renderNotes() {
  document.getElementById('notes-list').innerHTML = notes.length
    ? notes.slice().reverse().map(n=>`<div class="card" style="margin-bottom:12px">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">
          <div>
            <span style="font-weight:500;font-size:14px">${esc(n.title)||'Untitled'}</span>
            <span class="tag ${CAT_TAG[n.cat]}" style="margin-left:8px">${n.cat}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <span style="font-size:11px;color:var(--text3)">${n.date}</span>
            <button class="del-btn" onclick="deleteNote(${n.id})">×</button>
          </div>
        </div>
        <p style="font-size:13px;color:var(--text2);white-space:pre-wrap;line-height:1.6">${esc(n.body)}</p>
      </div>`).join('')
    : '<p class="empty" style="margin-bottom:14px">No notes yet.</p>';
}
function addNote() {
  const title=document.getElementById('note-title').value.trim();
  const body=document.getElementById('note-body').value.trim();
  const cat=document.getElementById('note-cat').value;
  if(!body) return;
  notes.push({id:Date.now(),title,body,cat,date:today()});
  document.getElementById('note-title').value='';
  document.getElementById('note-body').value='';
  save('eff_notes',notes); renderNotes(); toast('Note saved');
}
function deleteNote(id) {
  notes=notes.filter(n=>n.id!==id); save('eff_notes',notes); renderNotes();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function cap(s) { return s.charAt(0).toUpperCase()+s.slice(1); }

renderOverview();
</script>
</body>
</html>
